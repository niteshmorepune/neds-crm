name: Deploy to Hostinger

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, fileinfo, pdo_mysql, zip, gd, intl, openssl, sodium, curl
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Commit compiled assets
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add public/build/
          git diff --staged --quiet || git commit -m "chore: update compiled assets [skip ci]"
          git push || true

      # Hostinger SSH intermittently refuses/drops the connection (even a 120s
      # dial can time out), but a fresh attempt soon after succeeds. So retry the
      # whole deploy with a short per-attempt connect timeout — this lets the run
      # self-heal instead of needing a manual re-run. The on-server commands are
      # idempotent (reset --hard + composer + migrate + cache), so re-running is
      # safe.
      - name: Deploy to Hostinger via SSH
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 25
          max_attempts: 8
          retry_wait_seconds: 45
          command: |
            install -m 700 -d ~/.ssh
            printf '%s\n' "${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key
            ssh -i ~/.ssh/deploy_key -p "${{ secrets.HOSTINGER_SSH_PORT }}" \
              -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -o BatchMode=yes -o ConnectTimeout=30 -o ServerAliveInterval=15 \
              "${{ secrets.HOSTINGER_SSH_USERNAME }}@${{ secrets.HOSTINGER_SSH_HOST }}" \
              "set -e; cd ${{ secrets.DEPLOY_PATH }} && git fetch origin master && git reset --hard origin/master && composer install --no-dev --optimize-autoloader --no-interaction && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:clear && php artisan view:cache && php artisan event:cache && php artisan queue:restart && chmod -R 755 storage bootstrap/cache"
